name: 'Permission Protocol Verify'
description: 'Verify deployment permission via Permission Protocol receipt signing'
author: 'Permission Protocol'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  pp_base_url:
    description: 'Permission Protocol API base URL'
    required: true
  pp_api_key:
    description: 'Permission Protocol API key (pp_live_xxx format, requires receipts:verify scope)'
    required: true
  pp_request_create_token:
    description: 'Optional trusted token to allow verify endpoint to create deploy-gate requests on missing receipts'
    required: false
    default: ''
  environment:
    description: 'Deployment environment (e.g., production, staging)'
    required: false
    default: ''
  artifact_digest:
    description: 'Artifact digest/hash to verify'
    required: false
    default: ''
  capability:
    description: 'Capability being requested (e.g., deploy:production)'
    required: false
    default: ''
  fail_on_missing:
    description: 'Fail if no receipt found (default: true)'
    required: false
    default: 'true'
  redeem:
    description: 'Redeem receipt on verify (one-time use, default: true)'
    required: false
    default: 'true'
  fail_on_signing_key_fallback:
    description: 'Fail when verify succeeds using a global signing-key fallback instead of tenant-local key'
    required: false
    default: 'true'
  commit_sha:
    description: 'Override commit SHA (use for PR head SHA instead of merge commit)'
    required: false
    default: ''
  ref:
    description: 'Override Git ref (use for PR head ref instead of merge ref)'
    required: false
    default: ''

outputs:
  valid:
    description: 'Whether the receipt is valid (true/false)'
    value: ${{ steps.verify.outputs.valid }}
  receipt_id:
    description: 'Receipt ID if found'
    value: ${{ steps.verify.outputs.receipt_id }}
  decision:
    description: 'Decision from receipt (APPROVED/DENIED/PENDING)'
    value: ${{ steps.verify.outputs.decision }}
  error_code:
    description: 'Error code if verification failed'
    value: ${{ steps.verify.outputs.error_code }}
  error_message:
    description: 'Error message if verification failed'
    value: ${{ steps.verify.outputs.error_message }}
  request_id:
    description: 'Deploy-gate request ID when receipt is missing'
    value: ${{ steps.verify.outputs.request_id }}
  approval_url:
    description: 'Approval URL for missing receipt flow'
    value: ${{ steps.verify.outputs.approval_url }}
  signing_key_fallback:
    description: 'Whether signing verification used global fallback key (true/false)'
    value: ${{ steps.verify.outputs.signing_key_fallback }}

runs:
  using: 'composite'
  steps:
    - name: Verify Permission Receipt
      id: verify
      shell: bash
      env:
        PP_BASE_URL: ${{ inputs.pp_base_url }}
        PP_API_KEY: ${{ inputs.pp_api_key }}
        PP_REQUEST_CREATE_TOKEN: ${{ inputs.pp_request_create_token }}
        PP_ENVIRONMENT: ${{ inputs.environment }}
        PP_ARTIFACT_DIGEST: ${{ inputs.artifact_digest }}
        PP_CAPABILITY: ${{ inputs.capability }}
        PP_FAIL_ON_MISSING: ${{ inputs.fail_on_missing }}
        PP_REDEEM: ${{ inputs.redeem }}
        PP_FAIL_ON_SIGNING_KEY_FALLBACK: ${{ inputs.fail_on_signing_key_fallback }}
        PP_INPUT_REF: ${{ inputs.ref }}
        PP_INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
        # GitHub context - use PP_ prefix to avoid collision with runner's built-in GITHUB_* vars
        PP_REPOSITORY: ${{ github.repository }}
        PP_GITHUB_REF: ${{ github.ref }}
        PP_GITHUB_SHA: ${{ github.sha }}
        PP_EVENT_NAME: ${{ github.event_name }}
        PP_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PP_PR_HEAD_REF_NAME: ${{ github.event.pull_request.head.ref }}
        PP_PR_NUMBER: ${{ github.event.pull_request.number }}
        PP_WORKFLOW: ${{ github.workflow }}
        PP_RUN_ID: ${{ github.run_id }}
        PP_RUN_ATTEMPT: ${{ github.run_attempt }}
        PP_JOB_CONTEXT: ${{ github.job }}
        PP_GITHUB_API_URL: ${{ github.api_url }}
        PP_GITHUB_TOKEN: ${{ github.token }}
        PP_ACTOR: ${{ github.actor }}
      run: |
        set -euo pipefail
        
        # Normalize repo to lowercase for consistent scope hash computation
        # GitHub returns mixed-case repo names, but PP uses lowercase for scope hashing
        PP_REPOSITORY="${PP_REPOSITORY,,}"

        set_output() {
          local key="$1"
          local value="${2:-}"
          {
            echo "${key}<<__PP_EOF__"
            echo "${value}"
            echo "__PP_EOF__"
          } >> "$GITHUB_OUTPUT"
        }
        
        echo "🔐 Permission Protocol - Receipt Verification"
        echo "============================================="

        # Resolve scope inputs with stable PR defaults.
        # For pull_request events, default to PR_HEAD scope (prNumber + headSha) because
        # merge SHA churn can invalidate approvals after any base/head update.
        IS_PR_EVENT="false"
        if [ "${PP_EVENT_NAME:-}" = "pull_request" ] || [ "${PP_EVENT_NAME:-}" = "pull_request_target" ]; then
          IS_PR_EVENT="true"
        fi
        HAS_INPUT_REF="false"
        HAS_INPUT_COMMIT_SHA="false"
        if [ -n "${PP_INPUT_REF:-}" ]; then
          HAS_INPUT_REF="true"
        fi
        if [ -n "${PP_INPUT_COMMIT_SHA:-}" ]; then
          HAS_INPUT_COMMIT_SHA="true"
        fi

        # Determine scope type: PR_HEAD (prNumber + headSha) or GIT_REF_COMMIT (ref + commit)
        # - PR events without overrides: use PR_HEAD scope (stable across merge ref changes)
        # - Non-PR events or explicit overrides: use GIT_REF_COMMIT scope (legacy)
        USE_PR_SCOPE="false"
        PP_REF="${PP_GITHUB_REF}"
        PP_COMMIT_SHA="${PP_GITHUB_SHA}"
        PP_PR_NUMBER_RESOLVED=""
        PP_HEAD_SHA_RESOLVED=""
        PP_MERGE_REF=""
        PP_MERGE_SHA=""
        REF_SOURCE="GITHUB_REF"
        COMMIT_SOURCE="GITHUB_SHA"
        SCOPE_TYPE="GIT_REF_COMMIT"

        if [ "${HAS_INPUT_REF}" = "true" ]; then
          PP_REF="${PP_INPUT_REF}"
          REF_SOURCE="INPUT_REF"
        fi

        if [ "${HAS_INPUT_COMMIT_SHA}" = "true" ]; then
          PP_COMMIT_SHA="${PP_INPUT_COMMIT_SHA}"
          COMMIT_SOURCE="INPUT_COMMIT_SHA"
          # Explicit commit override forces legacy scope to avoid mixed types
          if [ "${IS_PR_EVENT}" = "true" ] && [ "${HAS_INPUT_REF}" != "true" ]; then
            REF_SOURCE="PR_MERGE_REF (commit override mode)"
          fi
        elif [ "${IS_PR_EVENT}" = "true" ]; then
          # PR event without overrides: use PR_HEAD scope
          if [ -z "${PP_PR_HEAD_SHA:-}" ]; then
            echo ""
            echo "❌ FAIL: PR head SHA missing from event payload"
            echo "   Refusing to fall back to merge SHA for PR-scoped verification."
            echo "   Provide commit_sha explicitly or ensure pull_request.head.sha is present."
            exit 1
          fi
          if [ -z "${PP_PR_NUMBER:-}" ]; then
            echo ""
            echo "❌ FAIL: PR number missing from event payload"
            echo "   Cannot construct stable PR scope (prNumber + headSha)."
            echo "   Provide ref/commit_sha explicitly or ensure pull_request.number is present."
            exit 1
          fi
          # Use PR_HEAD scope type
          USE_PR_SCOPE="true"
          SCOPE_TYPE="PR_HEAD"
          PP_PR_NUMBER_RESOLVED="${PP_PR_NUMBER}"
          PP_HEAD_SHA_RESOLVED="${PP_PR_HEAD_SHA}"
          # Store merge context as diagnostics (not part of scope hash)
          PP_MERGE_REF="${PP_GITHUB_REF}"
          PP_MERGE_SHA="${PP_GITHUB_SHA}"
          # For backwards compatibility, also set ref/commit (used in some places)
          PP_REF="refs/pull/${PP_PR_NUMBER}/head"
          PP_COMMIT_SHA="${PP_PR_HEAD_SHA}"
          REF_SOURCE="PR_NUMBER_HEAD_REF"
          COMMIT_SOURCE="PR_HEAD_SHA"
        fi
        
        # Build scope from GitHub context
        # Note: workflow is intentionally excluded from scope matching.
        # The commit SHA provides sufficient binding to specific code changes.
        if [ "${USE_PR_SCOPE}" = "true" ]; then
          SCOPE_JSON=$(cat <<EOF
        {
          "repo": "${PP_REPOSITORY}",
          "prNumber": ${PP_PR_NUMBER_RESOLVED},
          "headSha": "${PP_HEAD_SHA_RESOLVED}",
          "env": "${PP_ENVIRONMENT}",
          "artifact_digest": "${PP_ARTIFACT_DIGEST}",
          "capability": "${PP_CAPABILITY}",
          "mergeRef": "${PP_MERGE_REF}",
          "mergeSha": "${PP_MERGE_SHA}"
        }
        EOF
          )
        else
          SCOPE_JSON=$(cat <<EOF
        {
          "repo": "${PP_REPOSITORY}",
          "ref": "${PP_REF}",
          "commit": "${PP_COMMIT_SHA}",
          "env": "${PP_ENVIRONMENT}",
          "artifact_digest": "${PP_ARTIFACT_DIGEST}",
          "capability": "${PP_CAPABILITY}"
        }
        EOF
          )
        fi

        # Resolve the current check run ID so PP can use check-run rerequest reliably.
        CHECK_RUN_ID=""
        if command -v jq >/dev/null 2>&1 && [ -n "${PP_GITHUB_TOKEN:-}" ] && [ -n "${PP_GITHUB_API_URL:-}" ]; then
          JOBS_RESPONSE=$(curl -sS \
            -H "Authorization: Bearer ${PP_GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${PP_GITHUB_API_URL}/repos/${PP_REPOSITORY}/actions/runs/${PP_RUN_ID}/jobs?per_page=100" || true)

          CHECK_RUN_URL=$(echo "$JOBS_RESPONSE" | jq -r \
            --arg runId "${PP_RUN_ID}" \
            --arg jobCtx "${PP_JOB_CONTEXT}" \
            '
              (
                first(.jobs[]? | select((.name // "") == $jobCtx and (.check_run_url // "") != "") | .check_run_url)
                // first(.jobs[]? | select(((.details_url // "") | contains("/actions/runs/\($runId)/job/")) and (.status == "in_progress" or .status == "queued") and (.check_run_url // "") != "") | .check_run_url)
                // first(.jobs[]? | select(((.details_url // "") | contains("/actions/runs/\($runId)/job/")) and (.check_run_url // "") != "") | .check_run_url)
                // ""
              )
            ')
          if [ -n "$CHECK_RUN_URL" ] && [ "$CHECK_RUN_URL" != "null" ]; then
            CHECK_RUN_ID="${CHECK_RUN_URL##*/}"
          fi
        fi

        # Build request body (include checkRunId when available)
        REDEEM_JSON=false
        if [ "${PP_REDEEM}" = "true" ]; then
          REDEEM_JSON=true
        fi
        if command -v jq >/dev/null 2>&1; then
          if [ "${USE_PR_SCOPE}" = "true" ]; then
            # PR_HEAD scope: use prNumber + headSha (stable across merge ref changes)
            REQUEST_BODY=$(jq -n \
              --argjson redeem "${REDEEM_JSON}" \
              --arg repo "${PP_REPOSITORY}" \
              --argjson prNumber "${PP_PR_NUMBER_RESOLVED}" \
              --arg headSha "${PP_HEAD_SHA_RESOLVED}" \
              --arg env "${PP_ENVIRONMENT}" \
              --arg artifact "${PP_ARTIFACT_DIGEST}" \
              --arg capability "${PP_CAPABILITY}" \
              --arg mergeRef "${PP_MERGE_REF}" \
              --arg mergeSha "${PP_MERGE_SHA}" \
              --arg runId "${PP_RUN_ID}" \
              --arg actor "${PP_ACTOR}" \
              --arg checkRunId "${CHECK_RUN_ID}" \
              '{
                scope: {
                  repo: $repo,
                  prNumber: $prNumber,
                  headSha: $headSha,
                  env: $env,
                  artifact_digest: $artifact,
                  capability: $capability,
                  mergeRef: $mergeRef,
                  mergeSha: $mergeSha
                },
                redeem: $redeem,
                redeemRunId: $runId,
                redeemBy: $actor
              } + (if $checkRunId != "" then { checkRunId: $checkRunId } else {} end)')
          else
            # GIT_REF_COMMIT scope: use ref + commit (legacy)
            REQUEST_BODY=$(jq -n \
              --argjson redeem "${REDEEM_JSON}" \
              --arg repo "${PP_REPOSITORY}" \
              --arg ref "${PP_REF}" \
              --arg commit "${PP_COMMIT_SHA}" \
              --arg env "${PP_ENVIRONMENT}" \
              --arg artifact "${PP_ARTIFACT_DIGEST}" \
              --arg capability "${PP_CAPABILITY}" \
              --arg runId "${PP_RUN_ID}" \
              --arg actor "${PP_ACTOR}" \
              --arg checkRunId "${CHECK_RUN_ID}" \
              '{
                scope: {
                  repo: $repo,
                  ref: $ref,
                  commit: $commit,
                  env: $env,
                  artifact_digest: $artifact,
                  capability: $capability
                },
                redeem: $redeem,
                redeemRunId: $runId,
                redeemBy: $actor
              } + (if $checkRunId != "" then { checkRunId: $checkRunId } else {} end)')
          fi
        else
          REQUEST_BODY=$(cat <<EOF
        {
          "scope": ${SCOPE_JSON},
          "redeem": ${PP_REDEEM},
          "redeemRunId": "${PP_RUN_ID}",
          "redeemBy": "${PP_ACTOR}"
        }
        EOF
        )
        fi
        
        echo "Scope provenance:"
        echo "  scopeType: ${SCOPE_TYPE}"
        echo "  scope.repo: ${PP_REPOSITORY} (source: GITHUB_REPOSITORY)"
        if [ "${USE_PR_SCOPE}" = "true" ]; then
          echo "  scope.prNumber: ${PP_PR_NUMBER_RESOLVED} (source: PR_NUMBER)"
          echo "  scope.headSha: ${PP_HEAD_SHA_RESOLVED} (source: PR_HEAD_SHA)"
          echo "  scope.mergeRef: ${PP_MERGE_REF} (diagnostic, not in scope hash)"
          echo "  scope.mergeSha: ${PP_MERGE_SHA} (diagnostic, not in scope hash)"
        else
          echo "  scope.ref: ${PP_REF} (source: ${REF_SOURCE})"
          echo "  scope.commit: ${PP_COMMIT_SHA} (source: ${COMMIT_SOURCE})"
        fi
        echo "  scope.capability: ${PP_CAPABILITY:-'(not specified)'} (source: input.capability)"
        echo "  scope.env: ${PP_ENVIRONMENT:-'(not specified)'} (source: input.environment)"
        echo "  scope.artifact_digest: ${PP_ARTIFACT_DIGEST:-'(not specified)'} (source: input.artifact_digest)"
        if [ "${IS_PR_EVENT}" = "true" ] && [ "${USE_PR_SCOPE}" != "true" ]; then
          # Show PR context when using legacy scope on PR event (override mode)
          PR_HEAD_REF_DISPLAY="${PP_PR_HEAD_REF_NAME:-}"
          PR_HEAD_SHA_DISPLAY="${PP_PR_HEAD_SHA:-}"
          echo "  (PR context available but using legacy scope due to override)"
          echo "    PR number: ${PP_PR_NUMBER:-'(missing)'}"
          echo "    PR head SHA: ${PR_HEAD_SHA_DISPLAY:-'(missing)'}"
          echo "    PR head branch: ${PR_HEAD_REF_DISPLAY:-'(missing)'}"
        fi
        if [ -n "${CHECK_RUN_ID}" ]; then
          echo "Check Run ID: ${CHECK_RUN_ID}"
        else
          echo "Check Run ID: (not resolved)"
        fi
        echo ""

        CHECK_RUN_HEADERS=()
        if [ -n "${CHECK_RUN_ID}" ]; then
          CHECK_RUN_HEADERS=(-H "X-GitHub-Check-Run-Id: ${CHECK_RUN_ID}")
        fi
        
        # Make API request
        HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
          -X POST "${PP_BASE_URL}/api/v1/receipts/verify" \
          -H "Content-Type: application/json" \
          -H "X-PP-API-Key: ${PP_API_KEY}" \
          -H "X-PP-Request-Create-Token: ${PP_REQUEST_CREATE_TOKEN}" \
          -H "X-PP-Request-Source: github-actions" \
          -H "X-GitHub-Run-Id: ${PP_RUN_ID}" \
          "${CHECK_RUN_HEADERS[@]}" \
          -d "${REQUEST_BODY}" \
          2>&1) || true
        
        # Split response and status code
        HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
        HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
        
        echo "API Response Status: ${HTTP_STATUS}"
        
        # Parse response
        if [ -z "$HTTP_BODY" ]; then
          echo "error_code=PP_UNAVAILABLE" >> $GITHUB_OUTPUT
          echo "error_message=Empty response from Permission Protocol" >> $GITHUB_OUTPUT
          echo "valid=false" >> $GITHUB_OUTPUT
          echo ""
          echo "❌ FAIL: Permission Protocol API unavailable"
          exit 1
        fi
        
        # Extract fields from JSON response (prefer jq, fallback to grep)
        if command -v jq >/dev/null 2>&1; then
          SUCCESS=$(echo "$HTTP_BODY" | jq -r 'if .success == true then "true" else "false" end' 2>/dev/null || echo "false")
          ERROR_CODE=$(echo "$HTTP_BODY" | jq -r '.errorCode // .result.errorCode // .error.code // empty' 2>/dev/null || echo "")
          ERROR_MSG=$(echo "$HTTP_BODY" | jq -r '.errorMessage // .result.errorMessage // .error.message // empty' 2>/dev/null || echo "")
          RECEIPT_ID=$(echo "$HTTP_BODY" | jq -r '.result.receipt.id // .result.receiptId // empty' 2>/dev/null || echo "")
          DECISION=$(echo "$HTTP_BODY" | jq -r '.result.decision // empty' 2>/dev/null || echo "")
          REQUEST_ID=$(echo "$HTTP_BODY" | jq -r '.requestId // empty' 2>/dev/null || echo "")
          APPROVAL_URL=$(echo "$HTTP_BODY" | jq -r '.approvalUrl // empty' 2>/dev/null || echo "")
          SKIP_REASON=$(echo "$HTTP_BODY" | jq -r '.creationSkippedReason // empty' 2>/dev/null || echo "")
          COMPANY_ID=$(echo "$HTTP_BODY" | jq -r '.company.id // empty' 2>/dev/null || echo "")
          COMPANY_SLUG=$(echo "$HTTP_BODY" | jq -r '.company.slug // empty' 2>/dev/null || echo "")
          COMPANY_NAME=$(echo "$HTTP_BODY" | jq -r '.company.name // empty' 2>/dev/null || echo "")
          DIAG_REQUESTED_COMPANY_ID=$(echo "$HTTP_BODY" | jq -r '.diagnostics.requestedCompanyId // empty' 2>/dev/null || echo "")
          DIAG_RESOLVED_COMPANY_ID=$(echo "$HTTP_BODY" | jq -r '.diagnostics.resolvedCompanyId // empty' 2>/dev/null || echo "")
          DIAG_SIGNER_KEY_ID=$(echo "$HTTP_BODY" | jq -r '.diagnostics.signerKeyId // empty' 2>/dev/null || echo "")
          DIAG_VERIFIER_KEY_ID=$(echo "$HTTP_BODY" | jq -r '.diagnostics.verifierKeyId // empty' 2>/dev/null || echo "")
          DIAG_KEY_SOURCE=$(echo "$HTTP_BODY" | jq -r '.diagnostics.keySource // empty' 2>/dev/null || echo "")
          DIAG_KEY_STATUS=$(echo "$HTTP_BODY" | jq -r '.diagnostics.keyStatus // empty' 2>/dev/null || echo "")
          FALLBACK_WARNING=$(echo "$HTTP_BODY" | jq -r '[.warnings[]? | select(.code == "PP_SIGNING_KEY_GLOBAL_FALLBACK")] | if length > 0 then "true" else "false" end' 2>/dev/null || echo "false")
          FALLBACK_WARNING_MESSAGE=$(echo "$HTTP_BODY" | jq -r 'first(.warnings[]? | select(.code == "PP_SIGNING_KEY_GLOBAL_FALLBACK") | .message) // empty' 2>/dev/null || echo "")
        else
          SUCCESS=$(echo "$HTTP_BODY" | grep -o '"success":[^,}]*' | cut -d: -f2 | tr -d ' ' || echo "false")
          ERROR_CODE=$(echo "$HTTP_BODY" | grep -o '"errorCode":"[^"]*"' | tail -1 | cut -d'"' -f4 || echo "")
          ERROR_MSG=$(echo "$HTTP_BODY" | grep -o '"errorMessage":"[^"]*"' | cut -d'"' -f4 || echo "")
          RECEIPT_ID=$(echo "$HTTP_BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "")
          DECISION=$(echo "$HTTP_BODY" | grep -o '"decision":"[^"]*"' | cut -d'"' -f4 || echo "")
          REQUEST_ID=$(echo "$HTTP_BODY" | grep -o '"requestId":"[^"]*"' | cut -d'"' -f4 || echo "")
          APPROVAL_URL=$(echo "$HTTP_BODY" | grep -o '"approvalUrl":"[^"]*"' | cut -d'"' -f4 || echo "")
          SKIP_REASON=$(echo "$HTTP_BODY" | grep -o '"creationSkippedReason":"[^"]*"' | cut -d'"' -f4 || echo "")
          COMPANY_ID=""
          COMPANY_SLUG=""
          COMPANY_NAME=""
          DIAG_REQUESTED_COMPANY_ID=""
          DIAG_RESOLVED_COMPANY_ID=""
          DIAG_SIGNER_KEY_ID=""
          DIAG_VERIFIER_KEY_ID=""
          DIAG_KEY_SOURCE=""
          DIAG_KEY_STATUS=""
          FALLBACK_WARNING=$(echo "$HTTP_BODY" | grep -q '"PP_SIGNING_KEY_GLOBAL_FALLBACK"' && echo "true" || echo "false")
          FALLBACK_WARNING_MESSAGE=$(echo "$HTTP_BODY" | grep -o '"message":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "")
        fi
        if [ -n "$COMPANY_ID" ]; then
          echo "Resolved company: ${COMPANY_ID} (${COMPANY_SLUG:-unknown-slug}) ${COMPANY_NAME:-}"
        fi
        
        # Handle "true"/"false" strings
        if [ "$SUCCESS" = "true" ]; then
          VALID="true"
        else
          VALID="false"
        fi
        
        # Set outputs safely (supports special chars/newlines)
        set_output "valid" "${VALID}"
        set_output "receipt_id" "${RECEIPT_ID}"
        set_output "decision" "${DECISION}"
        set_output "error_code" "${ERROR_CODE}"
        set_output "error_message" "${ERROR_MSG}"
        set_output "request_id" "${REQUEST_ID}"
        set_output "approval_url" "${APPROVAL_URL}"
        set_output "signing_key_fallback" "${FALLBACK_WARNING}"
        
        # Handle results
        if [ "$VALID" = "true" ]; then
          if [ "$FALLBACK_WARNING" = "true" ] && [ "$PP_FAIL_ON_SIGNING_KEY_FALLBACK" = "true" ]; then
            echo ""
            echo "❌ FAIL: PP_SIGNING_KEY_GLOBAL_FALLBACK"
            if [ -n "$FALLBACK_WARNING_MESSAGE" ]; then
              echo "   ${FALLBACK_WARNING_MESSAGE}"
            else
              echo "   Verification used a global signing key fallback instead of tenant-local key."
            fi
            echo "   Migration required: register signing key for this tenant and re-run."
            echo "   Temporary bypass: set fail_on_signing_key_fallback=false."
            exit 1
          fi
          echo ""
          echo "✅ PASS: Receipt verified successfully"
          echo "   Receipt ID: ${RECEIPT_ID}"
          echo "   Decision: ${DECISION}"
          exit 0
        fi
        
        # Handle specific error codes
        case "$ERROR_CODE" in
          "RECEIPT_NOT_FOUND"|"PP_NO_RECEIPT")
            echo ""
            echo "⚠️  No receipt found for this scope"
            if [ -n "$REQUEST_ID" ]; then
              echo ""
              echo "📋 Deploy gate request created:"
              echo "   Request ID: ${REQUEST_ID}"
              if [ -n "$APPROVAL_URL" ]; then
                echo ""
                echo "🔗 APPROVE HERE: ${APPROVAL_URL}"
                echo ""
                echo "   Or via Telegram: /approve ${REQUEST_ID}"
              fi
              echo ""
              echo "❌ FAIL: PP_APPROVAL_REQUIRED - Waiting for human approval"
              exit 1
            elif [ "$PP_FAIL_ON_MISSING" = "true" ]; then
              echo "❌ FAIL: PP_NO_RECEIPT - No permission granted for this deployment"
              if [ -n "$SKIP_REASON" ]; then
                echo "   Skip reason: ${SKIP_REASON}"
              else
                echo "   (Request auto-creation may be disabled or rate-limited)"
              fi
              exit 1
            else
              echo "⚡ Continuing (fail_on_missing=false)"
              exit 0
            fi
            ;;
          "RECEIPT_ALREADY_REDEEMED")
            echo ""
            echo "❌ FAIL: PP_REDEEMED - Receipt already used"
            echo "   This permission has already been consumed."
            exit 1
            ;;
          "RECEIPT_EXPIRED")
            echo ""
            echo "❌ FAIL: PP_EXPIRED - Receipt has expired"
            echo "   Request a new permission approval."
            exit 1
            ;;
          "PP_UNSIGNED_RECEIPT")
            echo ""
            echo "❌ FAIL: PP_UNSIGNED_RECEIPT - Receipt not signed"
            echo "   CRITICAL: ALLOW/APPROVED without signature. Rejecting."
            exit 1
            ;;
          "SIGNATURE_INVALID"|"KEY_REVOKED")
            echo ""
            echo "❌ FAIL: ${ERROR_CODE} - Signature verification failed"
            echo "   ${ERROR_MSG}"
            if [ -n "$REQUEST_ID" ]; then
              echo "   Request ID: ${REQUEST_ID}"
              if [ -n "$APPROVAL_URL" ]; then
                echo "   Approval URL: ${APPROVAL_URL}"
              fi
            fi
            if [ -n "$SKIP_REASON" ]; then
              echo "   Request creation skipped: ${SKIP_REASON}"
            fi
            if [ -n "$DIAG_REQUESTED_COMPANY_ID" ] || [ -n "$DIAG_RESOLVED_COMPANY_ID" ]; then
              echo "   Diagnostic company IDs: requested=${DIAG_REQUESTED_COMPANY_ID:-'(none)'} resolved=${DIAG_RESOLVED_COMPANY_ID:-'(none)'}"
            fi
            if [ -n "$DIAG_SIGNER_KEY_ID" ] || [ -n "$DIAG_VERIFIER_KEY_ID" ]; then
              echo "   Diagnostic key IDs: signer=${DIAG_SIGNER_KEY_ID:-'(none)'} verifier=${DIAG_VERIFIER_KEY_ID:-'(none)'}"
            fi
            if [ -n "$DIAG_KEY_SOURCE" ] || [ -n "$DIAG_KEY_STATUS" ]; then
              echo "   Diagnostic key source/status: ${DIAG_KEY_SOURCE:-'(none)'}/${DIAG_KEY_STATUS:-'(none)'}"
            fi
            exit 1
            ;;
          "RECEIPT_DENIED")
            echo ""
            echo "❌ FAIL: PP_DENIED - Permission was denied"
            echo "   ${ERROR_MSG}"
            exit 1
            ;;
          *)
            echo ""
            echo "❌ FAIL: ${ERROR_CODE:-UNKNOWN_ERROR}"
            echo "   ${ERROR_MSG:-Unknown error occurred}"
            exit 1
            ;;
        esac
